<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAED OFERTAS - Grupo VIP de Promoções</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 80px 20px 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            justify-content: flex-start;
        }

      .header {
    margin-bottom: 10px;
}

        .header-icon {
            font-size: 16px;
        }

        .logo-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.4);
            overflow: hidden;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 32px;
            font-weight: 900;
        }

        .subtitle {
            font-size: 18px;
            color: #aaa;
        }

        .highlight {
            font-size: 20px;
            color: #ffd700;
            font-weight: 800;
        }

        .cta-button {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
            transition: 0.3s;
        }

      /* ANIMAÇÃO PULSANDO */
.cta-button {
    background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
    color: #000;
    border: none;
    padding: 18px 50px;
    font-size: 18px;
    font-weight: 900;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
    transition: all 0.3s ease;
    animation: pulseButton 1.2s infinite;
}

/* PULSE CONSTANTE */
@keyframes pulseButton {
    0% {
        transform: scale(1);
        box-shadow: 0 0 25px rgba(0,255,0,0.5);
    }
    50% {
        transform: scale(1.08);
        box-shadow: 0 0 45px rgba(0,255,0,0.9);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 25px rgba(0,255,0,0.5);
    }
}

/* QUANDO PASSA O MOUSE */
.cta-button:hover {
    transform: scale(1.12);
    box-shadow: 0 0 60px rgba(0,255,0,1);
}

        /* LOJAS */
        .stores {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .stores img {
            width: 70px;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .stores img:hover {
            opacity: 1;
            transform: scale(1.1);
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1.1); }
            50% { transform: scale(1.18); }
            100% { transform: scale(1.1); }
        }

        .social-proof {
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo-circle">
            <img src="CAEDOFERTAS.png">
        </div>

        <div>
            <h1 class="title">🎉 GRUPO VIP 🎉</h1>
            <p class="subtitle">100% GRATUITO</p>
        </div>

        <p class="highlight">OFERTAS com 50% 60% 70% OFF 🔥</p>

        <a href="https://chat.whatsapp.com/KApEqLvBhW4J7xBO9mjFD9" class="cta-button">
            🔥 ENTRAR NO GRUPO AGORA
        </a>
        <p class="social-proof">
            ⚡ JÁ SOMOS +180 MIL MEMBROS ⚡
        </p>

    </div>

</body>
</html>

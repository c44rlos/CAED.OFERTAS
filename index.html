<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAED OFERTAS - Grupo VIP de Promoções</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 80px 20px 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            justify-content: flex-start;
        }

        /* Header com logo e título */
        .header {
            position: absolute;
            top: 20px;
        }

        .header-icon {
            font-size: 16px;
            line-height: 1;
            display: inline-block;
        }

        /* Logo circular */
        .logo-circle {
            width: 160px;
            height: 160px;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.4);
            animation: float 3s ease-in-out infinite;
            overflow: hidden;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Textos principais */
        .title {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.2;
            margin: 5px 0;
        }

        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .highlight {
            font-size: 20px;
            color: #ffd700;
            font-weight: 800;
            margin: 15px 0;
        }

        /* Botão principal com glow */
        .cta-button {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 900;
            font-family: 'Montserrat', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6), 0 0 60px rgba(0, 255, 0, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.8), 0 0 80px rgba(0, 255, 0, 0.5);
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        /* Prova social */
        .social-proof {
            font-size: 16px;
            color: #fff;
            font-weight: 700;
            margin-top: 20px;
        }

        .social-proof-icon {
            font-size: 18px;
            margin: 0 5px;
            line-height: 1;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .container {
                padding: 80px 15px 30px;
                gap: 25px;
            }

            .title {
                font-size: 26px;
            }

            .subtitle {
                font-size: 16px;
            }

            .highlight {
                font-size: 18px;
            }

            .cta-button {
                padding: 16px 40px;
                font-size: 16px;
            }

            .logo-circle {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header (apenas ícone) -->
        <div class="header">
            <span class="header-icon"></span>
        </div>

        <!-- Logo Circular -->
        <div class="logo-circle">
            <img src="CAEDOFERTAS.png" alt="CAED OFERTAS Logo">
        </div>

        <!-- Título -->
        <div>
            <h1 class="title">🎉 GRUPO VIP 🎉</h1>
            <p class="subtitle">100% GRATUITO</p>
        </div>

        <!-- Destaque -->
        <p class="highlight">OFERTAS com 50% 60% 70% OFF 🔥</p>

        <!-- Botão CTA -->
        <a href="https://chat.whatsapp.com/KApEqLvBhW4J7xBO9mjFD9" class="cta-button">QUERO PARTICIPAR</a>

        <!-- Prova Social -->
        <p class="social-proof">
            <span class="social-proof-icon">⚡</span> JÁ SOMOS +180 MIL MEMBROS <span class="social-proof-icon">⚡</span>
        </p>
    </div>

</body>
</html>
